<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1A1A1A; font-family: Arial, sans-serif;
  display: flex; position: relative; overflow: hidden;
}
/* Bauhaus geometric accents */
.red-block {
  position: absolute; top: 0; left: 0; width: 180pt; height: 405pt;
  background: #BE1E2D;
}
.yellow-circle {
  position: absolute; top: 260pt; left: 120pt; width: 120pt; height: 120pt;
  background: #F2C41D; border-radius: 50%;
}
.blue-bar {
  position: absolute; top: 0; right: 0; width: 60pt; height: 405pt;
  background: #1A4B8C;
}
.content {
  position: absolute; top: 60pt; left: 210pt; width: 420pt;
}
.tag {
  margin: 0 0 12pt 0; padding: 0;
  color: #F2C41D; font-size: 10pt; letter-spacing: 4pt;
  text-transform: uppercase;
}
.title {
  margin: 0 0 16pt 0; padding: 0;
  color: #F5F0E8; font-size: 38pt; font-weight: bold;
  line-height: 1.15; letter-spacing: -1pt;
}
.subtitle {
  margin: 0 0 20pt 0; padding: 0;
  color: #CCCCCC; font-size: 13pt; line-height: 1.5;
}
.team {
  margin: 0; padding: 0;
  color: #F2C41D; font-size: 10pt; letter-spacing: 2pt;
  text-transform: uppercase;
}
.hackathon {
  position: absolute; bottom: 30pt; left: 210pt;
}
.hack-text {
  margin: 0; padding: 0;
  color: #666666; font-size: 9pt; letter-spacing: 2pt;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="red-block"></div>
<div class="yellow-circle"></div>
<div class="blue-bar"></div>
<div class="content">
  <p class="tag">Parametric Income Protection</p>
  <h1 class="title">GottaGO</h1>
  <p class="subtitle">Weekly income protection for Swiggy and Zomato delivery partners that pays automatically when verified external disruptions wipe out their earning day. Zero paperwork.</p>
  <p class="team">Team Synapse</p>
</div>
<div class="hackathon">
  <p class="hack-text">Guidewire DEVTrails 2026</p>
</div>
</body>
</html>
